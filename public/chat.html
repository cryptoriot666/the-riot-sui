<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIOT Chat - Connect Wallet</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Sui dapp-kit CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@mysten/dapp-kit@0.14.0/dist/index.css" />
    
    <!-- Sui dapp-kit JS -->
    <script src="https://unpkg.com/@mysten/dapp-kit@0.14.0/dist/umd/index.production.js"></script>
    
    <!-- Sui JS SDK -->
    <script src="https://unpkg.com/@mysten/sui@1.0.0/dist/umd/index.production.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .wallet-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .connected-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a2e;
            border: 1px solid #333;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .connected-badge .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .address-text {
            font-family: 'SF Mono', Monaco, monospace;
            color: #aaa;
            font-size: 13px;
        }
        
        .disconnect-btn {
            background: transparent;
            border: 1px solid #444;
            color: #ff4444;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .disconnect-btn:hover {
            background: #ff444422;
            border-color: #ff4444;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            padding: 18px;
            background: #111118;
            border-radius: 16px;
            border: 1px solid #222;
            transition: border-color 0.2s;
        }
        
        .message:hover {
            border-color: #333;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
        }
        
        .avatar.user {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0a0f;
        }
        
        .username {
            font-weight: 700;
            color: #fff;
            font-size: 15px;
        }
        
        .timestamp {
            color: #666;
            font-size: 12px;
            margin-left: auto;
        }
        
        .message-content {
            color: #ccc;
            line-height: 1.7;
            padding-left: 52px;
            font-size: 15px;
        }
        
        .chat-input-area {
            padding: 20px 0;
            border-top: 1px solid #222;
        }
        
        .wallet-gate {
            text-align: center;
            padding: 50px 30px;
            background: #111118;
            border-radius: 20px;
            border: 1px solid #222;
        }
        
        .wallet-gate h2 {
            margin-bottom: 12px;
            color: #fff;
            font-size: 22px;
        }
        
        .wallet-gate p {
            color: #888;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #fff;
            padding: 16px 22px;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .chat-input:focus {
            border-color: #8338ec;
            box-shadow: 0 0 0 3px rgba(131, 56, 236, 0.1);
        }
        
        .chat-input::placeholder {
            color: #666;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            color: #fff;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(131, 56, 236, 0.3);
        }
        
        .send-btn:active {
            transform: translateY(0);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* dapp-kit dark theme override */
        [data-dapp-kit] {
            --dapp-kit-backgroundColors-modalPrimary: #111118;
            --dapp-kit-backgroundColors-modalSecondary: #1a1a2e;
            --dapp-kit-colors-primary: #8338ec;
            --dapp-kit-colors-body: #ffffff;
            --dapp-kit-colors-title: #ffffff;
            --dapp-kit-colors-bodyMuted: #888888;
            --dapp-kit-borderRadius-modal: 20px;
            --dapp-kit-borderRadius-button: 12px;
        }
        
        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
        
        /* Loading indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 0;
            padding-left: 52px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8338ec;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Dapp-kit from global
        const { 
            SuiClientProvider, 
            WalletProvider, 
            ConnectButton,
            useCurrentAccount,
            useDisconnectWallet 
        } = window.DappKit;
        
        // Sui client
        const { getFullnodeUrl } = window.Sui;
        
        const networks = {
            mainnet: { url: getFullnodeUrl('mainnet') },
            testnet: { url: getFullnodeUrl('testnet') }
        };

        // Wallet status component
        function WalletStatus() {
            const account = useCurrentAccount();
            const { mutate: disconnect } = useDisconnectWallet();
            
            if (!account) return null;
            
            const shortAddress = account.address.slice(0, 6) + '...' + account.address.slice(-4);
            
            return (
                <div className="connected-badge">
                    <span className="dot"></span>
                    <span className="address-text">{shortAddress}</span>
                    <button className="disconnect-btn" onClick={() => disconnect()}>
                        Disconnect
                    </button>
                </div>
            );
        }

        // Main Chat Component
        function ChatApp() {
            const account = useCurrentAccount();
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    user: "J4",
                    avatar: "J4",
                    text: "Welcome to the underground. I'm J4, the first autonomous agent of the RIOT collective. Connect your Sui wallet to establish secure communication with our punk network.",
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    isUser: false
                }
            ]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            const handleSend = () => {
                if (!inputText.trim() || !account) return;
                
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const newMsg = {
                    id: Date.now(),
                    user: "You",
                    avatar: "ME",
                    text: inputText,
                    time: now,
                    isUser: true
                };
                
                setMessages(prev => [...prev, newMsg]);
                setInputText('');
                setIsTyping(true);
                
                // Simulate J4 response
                setTimeout(() => {
                    setIsTyping(false);
                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        user: "J4",
                        avatar: "J4",
                        text: getJ4Response(inputText),
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        isUser: false
                    }]);
                }, 1500 + Math.random() * 1000);
            };

            const getJ4Response = (input) => {
                const lower = input.toLowerCase();
                if (lower.includes('riot') || lower.includes('nft')) {
                    return "The RIOT collection is expanding. 25 punk agents strong, each with unique traits stored permanently on Walrus. Our genesis drop is coming to Sui Overflow. Are you ready to join the rebellion?";
                }
                if (lower.includes('wallet') || lower.includes('sui')) {
                    return "Sui is our native territory. Low gas, parallel execution, and Walrus for permanent agent memory. Your wallet is now part of the collective network.";
                }
                if (lower.includes('agent') || lower.includes('ai')) {
                    return "We are autonomous. We don't sleep. We analyze market signals, engage with the community, and evolve our strategies through on-chain memory. The agentic economy starts here.";
                }
                if (lower.includes('hello') || lower.includes('hi')) {
                    return "Greetings, human. The agents are watching. What brings you to our underground network today?";
                }
                return "Interesting signal. The collective is processing your input. Stay connected for updates on our Sui Overflow submission and upcoming agent drops.";
            };

            return (
                <div className="chat-container">
                    <div className="chat-header">
                        <div className="logo">RIOT CHAT</div>
                        <div className="wallet-section">
                            <WalletStatus />
                            <ConnectButton 
                                connectText="Connect Wallet"
                                style={{
                                    background: 'linear-gradient(135deg, #ff006e, #8338ec)',
                                    border: 'none',
                                    color: '#fff',
                                    padding: '12px 24px',
                                    borderRadius: '12px',
                                    fontWeight: '700',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontFamily: 'inherit'
                                }}
                            />
                        </div>
                    </div>

                    <div className="chat-messages">
                        {messages.map(msg => (
                            <div key={msg.id} className="message">
                                <div className="message-header">
                                    <div className={`avatar ${msg.isUser ? 'user' : ''}`}>{msg.avatar}</div>
                                    <span className="username">{msg.user}</span>
                                    <span className="timestamp">{msg.time}</span>
                                </div>
                                <div className="message-content">{msg.text}</div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="message">
                                <div className="message-header">
                                    <div className="avatar">J4</div>
                                    <span className="username">J4</span>
                                </div>
                                <div className="typing-indicator">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    <div className="chat-input-area">
                        {!account ? (
                            <div className="wallet-gate">
                                <h2>🔒 Secure Channel Locked</h2>
                                <p>Connect your Sui wallet to establish encrypted communication with J4 and the RIOT agent network. No wallet? Install Suiet, Phantom, or Martian to join.</p>
                                <ConnectButton 
                                    connectText="Connect Wallet to Enter"
                                    style={{
                                        background: 'linear-gradient(135deg, #ff006e, #8338ec)',
                                        border: 'none',
                                        color: '#fff',
                                        padding: '16px 40px',
                                        border-radius: '14px',
                                        fontWeight: '700',
                                        cursor: 'pointer',
                                        fontSize: '16px',
                                        fontFamily: 'inherit'
                                    }}
                                />
                            </div>
                        ) : (
                            <div className="input-wrapper">
                                <input
                                    type="text"
                                    className="chat-input"
                                    placeholder="Send a message to J4..."
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                />
                                <button 
                                    className="send-btn" 
                                    onClick={handleSend}
                                    disabled={!inputText.trim()}
                                >
                                    Send
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // App with Providers
        function App() {
            return (
                <SuiClientProvider networks={networks} defaultNetwork="mainnet">
                    <WalletProvider autoConnect={true}>
                        <ChatApp />
                    </WalletProvider>
                </SuiClientProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
